
<div style="padding:1rem 0;">
  <table style="width:100%; margin-bottom:1rem; font-size:13px; border-collapse:collapse;">
    <tr>
      <td style="width:33%; padding-right:12px; color:var(--color-text-secondary);">
        Forcing ω<br>
        <input type="range" id="s_omega" min="0.01" max="7.99" step="0.05" value="1.0" style="width:100%;">
        ω = <b id="v_omega">1.00</b>
      </td>
      <td style="width:33%; padding-right:12px; color:var(--color-text-secondary);">
        Natural ω₀<br>
        <input type="range" id="s_w0" min="0.5" max="5.0" step="0.1" value="2.0" style="width:100%;">
        ω₀ = <b id="v_w0">2.00</b>
      </td>
      <td style="width:33%; color:var(--color-text-secondary);">
        Damping c<br>
        <input type="range" id="s_c" min="0.05" max="2.0" step="0.05" value="0.3" style="width:100%;">
        c = <b id="v_c">0.30</b>
      </td>
    </tr>
  </table>

  <div style="display:flex; gap:10px; margin-bottom:1rem; flex-wrap:wrap;">
    <div style="background:var(--color-background-secondary); border-radius:8px; padding:8px 14px; min-width:110px;">
      <div style="font-size:11px; color:var(--color-text-secondary);">G(ω) at cursor</div>
      <div id="m_gcur" style="font-size:22px; font-weight:500; color:#1D9E75;">—</div>
    </div>
    <div style="background:var(--color-background-secondary); border-radius:8px; padding:8px 14px; min-width:110px;">
      <div style="font-size:11px; color:var(--color-text-secondary);">G(0) = 1/ω₀²</div>
      <div id="m_g0" style="font-size:22px; font-weight:500; color:var(--color-text-primary);">—</div>
    </div>
    <div style="background:var(--color-background-secondary); border-radius:8px; padding:8px 14px; min-width:110px;">
      <div style="font-size:11px; color:var(--color-text-secondary);">Peak G</div>
      <div id="m_gpeak" style="font-size:22px; font-weight:500; color:var(--color-text-primary);">—</div>
    </div>
    <div style="background:var(--color-background-secondary); border-radius:8px; padding:8px 14px; min-width:110px;">
      <div style="font-size:11px; color:var(--color-text-secondary);">Peak at ω</div>
      <div id="m_wpeak" style="font-size:22px; font-weight:500; color:var(--color-text-primary);">—</div>
    </div>
  </div>

  <canvas id="cv" width="700" height="300" style="width:100%; height:auto; display:block; border-radius:8px; border:0.5px solid rgba(136,135,128,0.3);"></canvas>

  <div style="display:flex; gap:16px; margin-top:8px; font-size:12px; color:var(--color-text-secondary);">
    <span><span style="display:inline-block;width:16px;height:3px;background:#378ADD;vertical-align:middle;border-radius:2px;"></span> G(ω) curve</span>
    <span><span style="display:inline-block;width:16px;height:0;border-top:2px dashed #E24B4A;vertical-align:middle;"></span> ω₀ (natural)</span>
    <span><span style="display:inline-block;width:16px;height:0;border-top:2px dashed #1D9E75;vertical-align:middle;"></span> ω (forcing)</span>
  </div>
</div>

<script>
var _cv = document.getElementById('cv');
var _ctx = _cv.getContext('2d');
var CW=700, CH=300, PL=55, PR=20, PT=20, PB=40;
var W=CW-PL-PR, H=CH-PT-PB, WMAX=8.0, N=500;

function _G(w,w0,c){ var D=(w0*w0-w*w)*(w0*w0-w*w)+4*c*c*w*w; return 1/Math.sqrt(D); }
function _cx(w){ return PL+(w/WMAX)*W; }
function _cy(g,ym){ return PT+(1-Math.min(g,ym)/ym)*H; }

function gDraw(){
  var w0=parseFloat(document.getElementById('s_w0').value);
  var c=parseFloat(document.getElementById('s_c').value);
  var wCur=parseFloat(document.getElementById('s_omega').value);

  document.getElementById('v_w0').textContent=w0.toFixed(2);
  document.getElementById('v_c').textContent=c.toFixed(2);
  document.getElementById('v_omega').textContent=wCur.toFixed(2);

  var pts=[],peakG=0,peakW=0;
  for(var i=0;i<=N;i++){
    var w=(i/N)*WMAX, g=_G(w,w0,c);
    pts.push([w,g]);
    if(g>peakG){peakG=g;peakW=w;}
  }
  var yMax=Math.min(peakG*1.15,15);
  var gCur=_G(wCur,w0,c);
  var g0=1/(w0*w0);

  document.getElementById('m_gcur').textContent=gCur>50?'>50':gCur.toFixed(4);
  document.getElementById('m_g0').textContent=g0.toFixed(4);
  document.getElementById('m_gpeak').textContent=peakG>50?'>50':peakG.toFixed(4);
  document.getElementById('m_wpeak').textContent=peakW.toFixed(3);

  _ctx.clearRect(0,0,CW,CH);

  /* grid */
  _ctx.strokeStyle='rgba(136,135,128,0.2)'; _ctx.lineWidth=0.5;
  [0,1,2,3,4,5,6,7,8].forEach(function(v){
    _ctx.beginPath();_ctx.moveTo(_cx(v),PT);_ctx.lineTo(_cx(v),PT+H);_ctx.stroke();
  });
  var step=yMax<=3?0.5:yMax<=6?1:2;
  for(var yv=0;yv<=yMax+0.001;yv+=step){
    _ctx.beginPath();_ctx.moveTo(PL,_cy(yv,yMax));_ctx.lineTo(PL+W,_cy(yv,yMax));_ctx.stroke();
  }

  /* axis labels */
  _ctx.fillStyle='#888780'; _ctx.font='11px sans-serif'; _ctx.textAlign='center';
  [0,1,2,3,4,5,6,7,8].forEach(function(v){_ctx.fillText(v,_cx(v),PT+H+18);});
  _ctx.textAlign='right';
  for(var yv=0;yv<=yMax+0.001;yv+=step){_ctx.fillText(yv.toFixed(1),PL-6,_cy(yv,yMax)+4);}
  _ctx.textAlign='center';
  _ctx.fillText('ω (driving frequency)',PL+W/2,CH-4);
  _ctx.save();_ctx.translate(12,PT+H/2);_ctx.rotate(-Math.PI/2);_ctx.fillText('G(ω)',0,0);_ctx.restore();

  /* ω₀ vertical line */
  _ctx.save();_ctx.strokeStyle='#E24B4A';_ctx.lineWidth=1.8;_ctx.setLineDash([6,4]);
  _ctx.beginPath();_ctx.moveTo(_cx(w0),PT);_ctx.lineTo(_cx(w0),PT+H);_ctx.stroke();
  _ctx.restore();

  /* G(ω) curve */
  _ctx.save();_ctx.strokeStyle='#378ADD';_ctx.lineWidth=2.5;_ctx.setLineDash([]);
  _ctx.beginPath();
  pts.forEach(function(p,i){
    i===0?_ctx.moveTo(_cx(p[0]),_cy(p[1],yMax)):_ctx.lineTo(_cx(p[0]),_cy(p[1],yMax));
  });
  _ctx.stroke();_ctx.restore();

  /* forcing ω crosshair — drawn LAST so it's on top */
  var dotX=_cx(wCur), dotY=_cy(gCur,yMax);

  /* vertical dashed line */
  _ctx.save();_ctx.strokeStyle='#1D9E75';_ctx.lineWidth=2;_ctx.setLineDash([6,4]);
  _ctx.beginPath();_ctx.moveTo(dotX,PT);_ctx.lineTo(dotX,PT+H);_ctx.stroke();_ctx.restore();

  /* horizontal dashed line to y-axis */
  _ctx.save();_ctx.strokeStyle='#1D9E75';_ctx.lineWidth=1.5;_ctx.setLineDash([4,3]);
  _ctx.beginPath();_ctx.moveTo(PL,dotY);_ctx.lineTo(dotX,dotY);_ctx.stroke();_ctx.restore();

  /* big dot */
  _ctx.beginPath();_ctx.arc(dotX,dotY,7,0,2*Math.PI);
  _ctx.fillStyle='#1D9E75';_ctx.fill();
  _ctx.strokeStyle='#fff';_ctx.lineWidth=2;_ctx.setLineDash([]);_ctx.stroke();

  /* label on canvas */
  var label='G='+( gCur>50?'>50':gCur.toFixed(3) );
  _ctx.font='bold 12px sans-serif';
  var lx=dotX+10, ly=dotY-8;
  if(lx+60>PL+W) lx=dotX-65;
  if(ly<PT+14) ly=dotY+18;
  _ctx.fillStyle='#1D9E75';
  _ctx.textAlign='left';
  _ctx.fillText(label,lx,ly);
}

/* attach events */
document.getElementById('s_omega').addEventListener('input',gDraw);
document.getElementById('s_w0').addEventListener('input',gDraw);
document.getElementById('s_c').addEventListener('input',gDraw);

/* also poll as fallback */
var _pv={w:-1,w0:-1,c:-1};
setInterval(function(){
  var w=+document.getElementById('s_omega').value;
  var w0=+document.getElementById('s_w0').value;
  var c=+document.getElementById('s_c').value;
  if(w!==_pv.w||w0!==_pv.w0||c!==_pv.c){_pv.w=w;_pv.w0=w0;_pv.c=c;gDraw();}
},50);

gDraw();
</script>
