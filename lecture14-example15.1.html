
<div style="padding:1rem 0;">
  <table style="width:100%; margin-bottom:1rem; font-size:13px; border-collapse:collapse;">
    <tr>
      <td style="width:50%; padding-right:16px; color:var(--color-text-secondary);">
        Forcing frequency ω<br>
        <input type="range" id="s_omega" min="0.1" max="2.5" step="0.05" value="1.0" style="width:100%;">
        ω = <b id="v_omega">1.00</b> &nbsp;|&nbsp; ω₀ = <b>√1.25 ≈ 1.118</b>
      </td>
      <td style="width:50%; color:var(--color-text-secondary);">
        Time range<br>
        <input type="range" id="s_tmax" min="10" max="80" step="5" value="40" style="width:100%;">
        t = 0 to <b id="v_tmax">40</b>
      </td>
    </tr>
  </table>

  <div style="display:flex; gap:10px; margin-bottom:1rem; flex-wrap:wrap;">
    <div style="background:var(--color-background-secondary); border-radius:8px; padding:8px 14px; min-width:120px;">
      <div style="font-size:11px; color:var(--color-text-secondary);">G(ω) gain</div>
      <div id="m_g" style="font-size:20px; font-weight:500; color:var(--color-text-primary);">—</div>
    </div>
    <div style="background:var(--color-background-secondary); border-radius:8px; padding:8px 14px; min-width:120px;">
      <div style="font-size:11px; color:var(--color-text-secondary);">Steady-state amp</div>
      <div id="m_amp" style="font-size:20px; font-weight:500; color:#378ADD;">—</div>
    </div>
    <div style="background:var(--color-background-secondary); border-radius:8px; padding:8px 14px; min-width:160px;">
      <div style="font-size:11px; color:var(--color-text-secondary);">Transient decays by t ≈</div>
      <div id="m_tdecay" style="font-size:20px; font-weight:500; color:#E24B4A;">—</div>
    </div>
  </div>

  <canvas id="cv" width="700" height="320" style="width:100%; height:auto; display:block; border-radius:8px; border:0.5px solid rgba(136,135,128,0.3);"></canvas>

  <div style="display:flex; gap:16px; margin-top:8px; font-size:12px; color:var(--color-text-secondary); flex-wrap:wrap;">
    <span><span style="display:inline-block;width:16px;height:3px;background:#888780;vertical-align:middle;border-radius:2px;"></span> total x(t)</span>
    <span><span style="display:inline-block;width:16px;height:0;border-top:2px dashed #E24B4A;vertical-align:middle;"></span> transient xh</span>
    <span><span style="display:inline-block;width:16px;height:0;border-top:2px dashed #378ADD;vertical-align:middle;"></span> steady-state xp</span>
  </div>
</div>

<script>
var _cv=document.getElementById('cv');
var _ctx=_cv.getContext('2d');
var CW=700,CH=320,PL=55,PR=20,PT=20,PB=40;
var W=CW-PL-PR, H=CH-PT-PB;

/* Example 15.1: x''+x'+1.25x = 3cos(wt), x(0)=2, x'(0)=3
   c=0.5 (coeff of x' is 2c => 2c=1 => c=0.5)
   w0=sqrt(1.25), eta=sqrt(w0^2-c^2)=sqrt(1.25-0.25)=1
   xp = G(w)*3*cos(wt-phi)
   phi = atan2(2cw, w0^2-w^2)
   xh = e^{-ct}(C1*cos(eta*t)+C2*sin(eta*t))
   Apply ICs to get C1,C2 */

function solve(omega, tmax, npts) {
  var c=0.5, w0sq=1.25, w0=Math.sqrt(w0sq), eta=1.0;
  var F0=3.0;
  var denom=(w0sq-omega*omega)*(w0sq-omega*omega)+4*c*c*omega*omega;
  var G=1/Math.sqrt(denom);
  var phi=Math.atan2(2*c*omega, w0sq-omega*omega);

  /* xp = G*F0*cos(wt-phi)
     xp(0)= G*F0*cos(-phi), xp'(0)= G*F0*w*sin(-phi) wait:
     xp'= -G*F0*w*sin(wt-phi) => xp'(0)= -G*F0*w*sin(-phi)= G*F0*w*sin(phi) */
  var xp0  =  G*F0*Math.cos(-phi);
  var xp0d =  G*F0*omega*Math.sin(phi);

  /* ICs: x(0)=2 => C1+xp0=2 => C1=2-xp0
     x'(0)=3 => -c*C1+eta*C2+xp0d=3 => C2=(3+c*C1-xp0d)/eta */
  var C1=2-xp0;
  var C2=(3+c*C1-xp0d)/eta;

  var dt=tmax/npts;
  var total=[],trans=[],steady=[];
  for(var i=0;i<=npts;i++){
    var t=i*dt;
    var xh=Math.exp(-c*t)*(C1*Math.cos(eta*t)+C2*Math.sin(eta*t));
    var xpp=G*F0*Math.cos(omega*t-phi);
    trans.push([t,xh]);
    steady.push([t,xpp]);
    total.push([t,xh+xpp]);
  }
  return {total,trans,steady,G,amp:G*F0,phi,C1,C2,c};
}

function _cx(t,tmax){ return PL+(t/tmax)*W; }
function _cy(y,ym){   return PT+H/2 - (y/ym)*(H/2)*0.9; }

function gDraw(){
  var omega=parseFloat(document.getElementById('s_omega').value);
  var tmax =parseFloat(document.getElementById('s_tmax').value);
  document.getElementById('v_omega').textContent=omega.toFixed(2);
  document.getElementById('v_tmax').textContent=tmax.toFixed(0);

  var sol=solve(omega,tmax,1000);
  document.getElementById('m_g').textContent=sol.G.toFixed(4);
  document.getElementById('m_amp').textContent=sol.amp.toFixed(4);
  document.getElementById('m_tdecay').textContent=(4/0.5).toFixed(1)+' s  (e⁻ᶜᵗ < 2%)';

  /* find yMax across all curves */
  var yMax=0;
  sol.total.forEach(function(p){if(Math.abs(p[1])>yMax)yMax=Math.abs(p[1]);});
  sol.trans.forEach(function(p){if(Math.abs(p[1])>yMax)yMax=Math.abs(p[1]);});
  yMax=Math.max(yMax,sol.amp)*1.15;

  _ctx.clearRect(0,0,CW,CH);

  /* grid */
  _ctx.strokeStyle='rgba(136,135,128,0.15)'; _ctx.lineWidth=0.5;
  for(var tv=0;tv<=tmax;tv+=Math.ceil(tmax/8)){
    var x=_cx(tv,tmax);
    _ctx.beginPath();_ctx.moveTo(x,PT);_ctx.lineTo(x,PT+H);_ctx.stroke();
  }
  [-1,-0.5,0,0.5,1].forEach(function(frac){
    var y=_cy(frac*yMax,yMax);
    _ctx.beginPath();_ctx.moveTo(PL,y);_ctx.lineTo(PL+W,y);_ctx.stroke();
  });

  /* zero line */
  _ctx.strokeStyle='rgba(136,135,128,0.4)'; _ctx.lineWidth=1; _ctx.setLineDash([]);
  _ctx.beginPath();_ctx.moveTo(PL,_cy(0,yMax));_ctx.lineTo(PL+W,_cy(0,yMax));_ctx.stroke();

  /* labels */
  _ctx.fillStyle='#888780'; _ctx.font='11px sans-serif';
  _ctx.textAlign='center';
  for(var tv=0;tv<=tmax;tv+=Math.ceil(tmax/8)){
    _ctx.fillText(tv,_cx(tv,tmax),PT+H+18);
  }
  _ctx.textAlign='right';
  [-1,-0.5,0,0.5,1].forEach(function(frac){
    _ctx.fillText((frac*yMax).toFixed(1),PL-6,_cy(frac*yMax,yMax)+4);
  });
  _ctx.textAlign='center';
  _ctx.fillText('t',PL+W/2,CH-4);
  _ctx.save();_ctx.translate(12,PT+H/2);_ctx.rotate(-Math.PI/2);_ctx.fillText('x(t)',0,0);_ctx.restore();

  function drawCurve(pts,color,dash,lw){
    _ctx.save();_ctx.strokeStyle=color;_ctx.lineWidth=lw||1.8;_ctx.setLineDash(dash||[]);
    _ctx.beginPath();
    pts.forEach(function(p,i){
      var px=_cx(p[0],tmax), py=_cy(p[1],yMax);
      i===0?_ctx.moveTo(px,py):_ctx.lineTo(px,py);
    });
    _ctx.stroke();_ctx.restore();
  }

  drawCurve(sol.trans,  '#E24B4A',[5,4],1.8);
  drawCurve(sol.steady, '#378ADD',[5,4],1.8);
  drawCurve(sol.total,  '#444441',[],   2.5);
}

document.getElementById('s_omega').addEventListener('input',gDraw);
document.getElementById('s_tmax').addEventListener('input',gDraw);

var _pv={w:-1,t:-1};
setInterval(function(){
  var w=+document.getElementById('s_omega').value;
  var t=+document.getElementById('s_tmax').value;
  if(w!==_pv.w||t!==_pv.t){_pv.w=w;_pv.t=t;gDraw();}
},50);

gDraw();
</script>
